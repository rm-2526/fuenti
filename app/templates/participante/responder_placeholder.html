{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card mt-4">
      <div class="card-body">
        <h1 class="h4 mb-2">{{ sesion.evaluacion.titulo }}</h1>
        <p class="text-muted small mb-4">
          Sesión: <span class="font-monospace">{{ sesion.codigo }}</span>
        </p>

        <div class="alert alert-success">
          Ingreso confirmado.
        </div>

        <div class="alert alert-info mb-0">
          <strong>Cuestionario en construcción.</strong><br>
          El formulario de respuestas estará disponible en la próxima entrega.
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
