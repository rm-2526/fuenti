{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card mt-4">
      <div class="card-body text-center">
        <h1 class="h4 mb-3">Sesión cerrada</h1>
        <p class="text-muted">
          La sesión <span class="font-monospace">{{ sesion.codigo }}</span>
          ya no acepta más ingresos.
        </p>
        <p class="text-muted small mb-0">
          Si crees que es un error, contacta al facilitador.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
